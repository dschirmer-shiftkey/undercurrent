name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main, dev]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**', 'LICENSE', '.gitignore']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Reliability eval gate
        if: matrix.node-version == 20
        run: npm run eval:reliability

      - name: Verify package
        run: npm pack --dry-run
